<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貸款轉貸提案</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 14px; background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif; color: #333; }
  .wrap { max-width: 520px; margin: 0 auto; }
  /* 電腦版：左右兩欄（手機維持單欄） */
  @media (min-width: 900px) {
    .wrap { max-width: 1080px; }
    .layout { display: flex; align-items: flex-start; gap: 24px; }
    .col-input { flex: 0 0 470px; min-width: 0; }
    .col-output { flex: 1; min-width: 0; position: sticky; top: 14px; }
  }
  h1 { color: #1a5490; font-size: 22px; text-align: center; margin: 0 0 4px; }
  .sub { color: #888; font-size: 13px; text-align: center; margin: 0 0 18px; }
  .card { background: #fff; padding: 16px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 14px; }
  .card h3 { margin: 0 0 14px; font-size: 17px; }
  .name-input { border: none; border-bottom: 1.5px dashed currentColor; background: transparent; font-size: inherit; font-weight: bold; color: inherit; width: 100%; outline: none; padding: 2px 0; }
  .name-input:focus { border-bottom-style: solid; }
  .seclabel { font-size: 14px; font-weight: bold; color: #e8505b; margin: 4px 2px 10px; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
  input[type=number], input[type=date] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
  input[type=date] { -webkit-appearance: none; appearance: none; min-width: 0; min-height: 46px; }
  .grid2 > div { min-width: 0; }
  .field { margin-bottom: 14px; }
  .hint { font-size: 12px; color: #999; margin: 6px 0 0; }
  .calc { font-size: 13px; font-weight: bold; margin: 6px 0 0; }
  .bankchk { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; margin-bottom: 14px; cursor: pointer; }
  .bankchk input { width: auto; }
  .stage { background: #f7f9fb; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
  .stage-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .stage-head span { font-size: 13px; color: #666; font-weight: bold; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid2 input { padding: 10px; }
  .grid2 label { font-size: 11px; }
  .addbtn { width: 100%; padding: 10px; border: 1px dashed; border-radius: 8px; background: none; font-size: 14px; cursor: pointer; }
  .rm { background: none; border: none; color: #ff6b6b; font-size: 13px; cursor: pointer; }
  .seg { display: flex; gap: 6px; margin-bottom: 8px; }
  .seg button { flex: 1; padding: 8px; border: 1px solid #ddd; background: #fff; border-radius: 8px; font-size: 13px; cursor: pointer; color: #888; }
  .seg button.on { background: #1a5490; color: #fff; border-color: #1a5490; }
  .export-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .export-bar button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; color: #fff; }
  #btnPdf { background: #e8505b; }
  #btnImg { background: #1a5490; }
  .export-bar button:disabled { opacity: .5; cursor: wait; }
  #proposal { background: #fff; padding: 22px; border-radius: 12px; }
  #proposal .ptitle { text-align: center; margin: 0 0 4px; color: #1a5490; font-size: 20px; }
  #proposal .pdate { text-align: center; color: #aaa; font-size: 12px; margin: 0 0 18px; }
  #proposal .sect { font-size: 15px; font-weight: bold; color: #222; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 2px solid #eee; }
  #proposal .sect:first-of-type { margin-top: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 6px; text-align: right; vertical-align: top; }
  th:first-child, td:first-child { text-align: left; }
  thead th { background: #f4f4f4; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  .c1 { color: #e8505b; }
  .c2 { color: #14a098; }
  .pill { padding: 2px 8px; border-radius: 6px; font-weight: bold; }
  .pill.r { background: #ffe3e3; color: #e8505b; }
  .pill.g { background: #e6f4ea; color: #14a098; }
  .hl { background: #e6f4ea; }
  .hl td { font-weight: bold; color: #2f9e44; }
  .small { font-size: 11px; color: #999; font-weight: normal; }
  .feebox { background: #fff7e6; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.9; }
  .feebox b { color: #d68f00; }
  .gracebox { background: #eef4fb; padding: 10px 12px; border-radius: 8px; font-size: 12px; color: #547; line-height: 1.7; margin-top: 8px; }
  .benefit { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
  .benefit .n { color: #1a5490; font-weight: bold; white-space: nowrap; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 12px; }
  .bar-row .bl { width: 56px; }
  .bar-track { flex: 1; background: #f0f0f0; border-radius: 6px; height: 22px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; color: #fff; font-size: 11px; }
  .segrow { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #f5f5f5; }
  .disclaimer { font-size: 11px; color: #aaa; text-align: center; margin-top: 16px; }
  .repay-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .repay-toggle button { flex: 1; padding: 8px; border: 1px solid #ddd; background: #fff; border-radius: 8px; font-size: 13px; cursor: pointer; color: #888; }
  .repay-toggle button.on { background: #1a5490; color: #fff; border-color: #1a5490; }
  .io-warn { background: #fff3cd; border: 1px solid #ffc107; padding: 10px 12px; border-radius: 8px; font-size: 12px; color: #856404; margin-top: 8px; line-height: 1.7; }
  .header-card { border-left: 4px solid #6c5ce7; }
  .header-card h3 { color: #6c5ce7; }
  .header-card input[type=text], .header-card input[type=date] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
  #proposal .pheader { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 0 14px; margin-bottom: 18px; border-bottom: 2px solid #1a5490; }
  #proposal .pheader-left .client { font-size: 20px; font-weight: bold; color: #1a5490; }
  #proposal .pheader-left .client-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
  #proposal .pheader-right { text-align: right; font-size: 12px; color: #888; line-height: 1.8; }
  #proposal .keypoint { background: #eef4fb; border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; font-size: 14px; color: #547; line-height: 1.6; }
  #proposal .keypoint b { color: #1a5490; font-size: 19px; }
  #proposal table.detail { table-layout: fixed; }
  #proposal table.detail th, #proposal table.detail td { overflow-wrap: anywhere; padding: 7px 4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>貸款轉貸提案</h1>
  <p class="sub">本息攤還 · 多段利率 · 寬限期 · 多筆原貸 · 違約金 · 回本試算 · 可匯出</p>

  <div class="layout">
  <div class="col-input">

  <div class="export-bar">
    <button id="btnPdf">匯出 PDF</button>
    <button id="btnImg">匯出圖片</button>
    <button id="btnImport" style="background:#6c5ce7">匯入提案</button>
  </div>
  <input type="file" id="importFile" accept="image/*" style="display:none">

  <!-- 提案抬頭 -->
  <div class="card header-card">
    <h3>提案抬頭（選填）</h3>
    <div class="grid2">
      <div class="field"><label>客戶姓名</label><input type="text" id="clientName" placeholder="例：王大明 先生／小姐"></div>
      <div class="field"><label>業務員</label><input type="text" id="agentName" placeholder="您的姓名"></div>
    </div>
    <div class="field" style="margin-bottom:0"><label>提案日期</label><input type="date" id="proposalDate"></div>
  </div>

  <!-- 原貸款（現況）動態列表 -->
  <div class="seclabel">原貸款（現況）</div>
  <div id="origLoans"></div>
  <button class="addbtn" id="addOrigLoan" style="border-color:#e8505b;color:#e8505b;margin-bottom:18px">+ 新增原貸款（最多 5 筆）</button>

  <!-- 方案2 -->
  <div class="card" style="border-left:4px solid #14a098">
    <h3 style="color:#14a098"><input class="name-input" id="name2" value="方案 2（轉貸後）"></h3>
    <div class="field"><label>還款方式</label>
      <div class="repay-toggle" id="toggleRepay2">
        <button data-mode="amort" class="on">本利攤還</button>
        <button data-mode="io">純繳息（到期還本）</button>
      </div>
    </div>
    <div class="field"><label>貸款金額（元）</label><input type="number" id="p2" placeholder="輸入新貸款金額"></div>
    <div class="field"><label>期數（月）</label><input type="number" id="n2" placeholder="例如 240"><p class="hint" id="y2"></p></div>
    <div class="field" id="g2wrap"><label>寬限期（選填，月）</label><input type="number" id="g2" placeholder="0 = 無寬限期"><p class="hint">寬限期內只繳息、不還本</p></div>
    <div class="field"><label>第一段利率（%）· 第 1 期起</label><input type="number" step="0.01" id="r2" placeholder="例如 2.8"></div>
    <div id="stages2"></div>
    <button class="addbtn" id="add2" style="border-color:#14a098;color:#14a098">+ 新增分段利率（選填）</button>
  </div>

  <!-- 費用（選填）-->
  <div class="card" style="border-left:4px solid #f0a500">
    <h3 style="color:#d68f00">費用明細（選填）</h3>
    <div class="field">
      <label>轉貸服務費</label>
      <div class="seg" id="segSvc">
        <button data-mode="percent" class="on">% × 新貸款</button>
        <button data-mode="diff">差額 %</button>
        <button data-mode="amount">直接金額</button>
      </div>
      <div id="svcPct"><input type="number" step="0.1" id="svcPercent" placeholder="輸入百分比 %"><p class="hint" id="svcFormula"></p><p class="calc" id="svcCalc" style="color:#d68f00"></p></div>
      <div id="svcAmt" style="display:none"><input type="number" id="svcAmount" placeholder="直接輸入金額（元）"></div>
    </div>
    <div class="field">
      <label>代墊費用</label>
      <div class="seg" id="segAdv"><button data-mode="percent" class="on">按 % 計算</button><button data-mode="amount">直接填金額</button></div>
      <div id="advPct"><input type="number" step="0.1" id="advPercent" placeholder="例如 4（% × 非銀行原貸款額）"><p class="hint">基數為「非銀行」原貸款本金合計（銀行那筆不計）</p><p class="calc" id="advCalc" style="color:#d68f00"></p></div>
      <div id="advAmt" style="display:none"><input type="number" id="advAmount" placeholder="直接輸入金額（元）"></div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label>代書費</label>
      <input type="number" id="deedAmount" placeholder="直接輸入金額（元）">
    </div>
  </div>

  <!-- 顯示選項 -->
  <div class="card" style="border-left:4px solid #6c5ce7">
    <h3 style="color:#6c5ce7">顯示選項</h3>
    <label class="bankchk"><input type="checkbox" id="showDetail" checked> 提案顯示「原貸款明細」（多筆時）</label>
    <label class="bankchk"><input type="checkbox" id="showPayback" checked> 提案顯示「回本速度試算」</label>
    <label class="bankchk" style="margin-bottom:0"><input type="checkbox" id="showQR" checked> 匯出含「還原碼 QR」（給客戶可關閉）</label>
  </div>

  </div><!-- /col-input -->
  <div class="col-output">
  <div id="proposal"></div>
  </div><!-- /col-output -->
  </div><!-- /layout -->
</div>

<script>
const palette = ['#e8505b', '#f6a04d', '#e6739f', '#9b59b6', '#e67e22'];

const state = {
  header: { clientName: '', agentName: '', date: '' },
  origLoans: [
    { name: '原貸款（現況）', isBank: false, interestOnly: false, principal: 0, periods: 0, grace: 0, stages: [{ fromMonth: 1, rate: 0 }], startDate: '', lockPeriods: 0, penaltyPct: 0 }
  ],
  loan2: { name: '方案 2（轉貸後）', principal: 0, periods: 0, grace: 0, stages: [{ fromMonth: 1, rate: 0 }], interestOnly: false },
  svc: { mode: 'percent', percent: '', amount: '' },
  adv: { mode: 'percent', percent: '', amount: '' },
  deed: { amount: '' },
  ui: { showPayback: true, showDetail: true, showQR: true }
};

const nf = (v) => Math.round(v).toLocaleString('en-US');
const escapeHtml = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const escapeAttr = (s) => String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;');

function payment(bal, annualRate, n) {
  const r = annualRate / 100 / 12;
  if (n <= 0) return 0;
  if (r === 0) return bal / n;
  return bal * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
}

// 月份差（起始日 → 今天 的「整月數」）
function monthsBetween(startISO, today) {
  const s = new Date(startISO + 'T00:00:00');
  if (isNaN(s.getTime())) return 0;
  let m = (today.getFullYear() - s.getFullYear()) * 12 + (today.getMonth() - s.getMonth());
  if (today.getDate() < s.getDate()) m -= 1;
  return m;
}

// 逐月模擬，回傳每月明細
function simulate(loan) {
  const principal = loan.principal || 0;
  const periods = loan.periods || 0;
  const io = !!loan.interestOnly;
  const stages = (loan.stages && loan.stages.length) ? loan.stages : [{ fromMonth: 1, rate: 0 }];
  const graceMonths = io ? 0 : Math.max(0, Math.min(loan.grace || 0, periods));
  const sorted = stages.filter(s => s.rate >= 0 && s.fromMonth >= 1).sort((a, b) => a.fromMonth - b.fromMonth);
  if (!sorted.length || sorted[0].fromMonth !== 1) sorted.unshift({ fromMonth: 1, rate: stages[0] ? stages[0].rate : 0 });
  const rateAt = (month) => { let r = sorted[0].rate; for (const s of sorted) if (month >= s.fromMonth) r = s.rate; return r; };

  const months = [];
  let balance = principal, currentPay = 0, lastRate = null;
  for (let m = 1; m <= periods; m++) {
    const rate = rateAt(m), mr = rate / 100 / 12;
    let pay, interest, type;
    if (io) {
      type = 'io'; interest = balance * mr; pay = interest;
    } else if (m <= graceMonths) {
      type = 'grace'; interest = balance * mr; pay = interest;
    } else {
      type = 'amort';
      if (rate !== lastRate || m === graceMonths + 1) { currentPay = payment(balance, rate, periods - m + 1); lastRate = rate; }
      pay = currentPay; interest = balance * mr; balance -= (pay - interest);
    }
    months.push({ m, rate, type, pay, interest, balanceAfter: balance });
  }
  return { months, periods, principal };
}

// 分析單筆貸款：含「起始日 → 剩餘」與違約金 / 清償金額
function analyze(loan, today) {
  const sim = simulate(loan);
  const periods = sim.periods;
  const hasDate = !!loan.startDate;
  let elapsed = 0;
  if (hasDate) elapsed = Math.max(0, Math.min(monthsBetween(loan.startDate, today), periods));

  const remMonths = sim.months.slice(elapsed);
  const balanceNow = elapsed > 0 ? (sim.months[elapsed - 1] ? sim.months[elapsed - 1].balanceAfter : sim.principal) : sim.principal;
  const remainingPeriods = periods - elapsed;

  let totalInterest = 0, totalPayments = 0;
  remMonths.forEach(x => { totalInterest += x.interest; totalPayments += x.pay; });

  const segments = [];
  remMonths.forEach(x => {
    const rp = Math.round(x.pay);
    const last = segments[segments.length - 1];
    if (!last || last.type !== x.type || last.rate !== x.rate || Math.abs(last.pay - rp) > 1)
      segments.push({ fromMonth: x.m, type: x.type, rate: x.rate, pay: rp });
  });
  const afterGrace = segments.find(s => s.type === 'amort');
  const grace = loan.interestOnly ? 0 : (loan.grace || 0);
  const hasGrace = grace > 0 && elapsed < grace;

  const penaltyPct = parseFloat(loan.penaltyPct) || 0;
  const lock = parseInt(loan.lockPeriods) || 0;
  const inLock = lock > 0 && elapsed < lock;
  const penalty = (inLock && penaltyPct > 0) ? Math.round((loan.principal || 0) * penaltyPct / 100) : 0;
  const payoff = Math.round(balanceNow) + penalty; // 清償金額 = 剩餘本金餘額 + 違約金

  const curRate = remMonths.length ? remMonths[0].rate : (sim.months.length ? sim.months[sim.months.length - 1].rate : (loan.stages[0] ? loan.stages[0].rate : 0));

  return {
    name: loan.name, isBank: !!loan.isBank, principal: loan.principal || 0,
    periodsTotal: periods, elapsed, remainingPeriods, hasDate,
    balanceNow: Math.round(balanceNow),
    firstPayment: remMonths.length ? Math.round(remMonths[0].pay) : 0,
    afterGracePayment: afterGrace ? afterGrace.pay : 0,
    totalInterest: Math.round(totalInterest), totalPayments: Math.round(totalPayments),
    segments, multiSegment: segments.length > 1, hasGrace, graceMonths: grace,
    interestOnly: !!loan.interestOnly, balloon: loan.interestOnly ? Math.round(balanceNow) : 0,
    penalty, payoff, lock, inLock, curRate
  };
}

function ratesLabelStages(loan) {
  const s = [...loan.stages].sort((a, b) => a.fromMonth - b.fromMonth);
  if (s.length === 1) return s[0].rate + '%';
  return s.map(x => '第' + x.fromMonth + '期 ' + x.rate + '%').join('<br>');
}

// ====== 原貸款卡片（動態） ======
function renderLoanStages(loan, c) {
  c.innerHTML = '';
  loan.stages.slice(1).forEach((stage, i) => {
    const idx = i + 1;
    const div = document.createElement('div');
    div.className = 'stage';
    div.innerHTML =
      '<div class="stage-head"><span>第 ' + (idx + 1) + ' 段（選填）</span><button class="rm">移除</button></div>' +
      '<div class="grid2"><div><label>第幾期起</label><input type="number" class="sf" value="' + stage.fromMonth + '"></div>' +
      '<div><label>利率（%）</label><input type="number" step="0.01" class="sr" value="' + stage.rate + '"></div></div>';
    div.querySelector('.rm').onclick = () => { loan.stages.splice(idx, 1); renderLoanStages(loan, c); render(); };
    div.querySelector('.sf').oninput = (e) => { loan.stages[idx].fromMonth = parseInt(e.target.value) || 1; render(); };
    div.querySelector('.sr').oninput = (e) => { loan.stages[idx].rate = parseFloat(e.target.value) || 0; render(); };
    c.appendChild(div);
  });
}

function loanCardEl(loan, idx) {
  const col = palette[idx % palette.length];
  const card = document.createElement('div');
  card.className = 'card';
  card.style.borderLeft = '4px solid ' + col;
  const removeBtn = state.origLoans.length > 1 ? '<button class="rm" data-act="remove" style="margin-top:6px;display:block">✕ 移除此筆</button>' : '';
  card.innerHTML =
    '<h3 style="color:' + col + '"><input class="name-input" data-f="name" value="' + escapeAttr(loan.name) + '"></h3>' +
    '<label class="bankchk"><input type="checkbox" data-f="isBank"' + (loan.isBank ? ' checked' : '') + '> 此筆為<b>銀行貸款</b>（影響代墊／差額計算）</label>' +
    '<div class="field"><label>還款方式</label><div class="repay-toggle" data-f="repay">' +
      '<button data-mode="amort" class="' + (loan.interestOnly ? '' : 'on') + '">本利攤還</button>' +
      '<button data-mode="io" class="' + (loan.interestOnly ? 'on' : '') + '">純繳息（到期還本）</button></div></div>' +
    '<div class="field"><label>貸款金額（元）</label><input type="number" data-f="principal" value="' + (loan.principal || '') + '" placeholder="輸入貸款金額"></div>' +
    '<div class="field"><label>期數（月）</label><input type="number" data-f="periods" value="' + (loan.periods || '') + '" placeholder="例如 120"><p class="hint" data-f="yhint"></p></div>' +
    '<div class="field" data-f="gracewrap"' + (loan.interestOnly ? ' style="display:none"' : '') + '><label>寬限期（選填，月）</label><input type="number" data-f="grace" value="' + (loan.grace || '') + '" placeholder="0 = 無寬限期"><p class="hint">寬限期內只繳息、不還本</p></div>' +
    '<div class="field"><label>第一段利率（%）· 第 1 期起</label><input type="number" step="0.01" data-f="rate0" value="' + (loan.stages[0].rate || '') + '" placeholder="例如 14"></div>' +
    '<div data-f="stages"></div>' +
    '<button class="addbtn" data-act="addStage" style="border-color:' + col + ';color:' + col + '">+ 新增分段利率（選填）</button>' +
    '<div class="grid2" style="margin-top:14px"><div><label>起始日期（選填）</label><input type="date" data-f="startDate" value="' + (loan.startDate || '') + '"></div>' +
    '<div><label>綁約期數（選填）</label><input type="number" data-f="lockPeriods" value="' + (loan.lockPeriods || '') + '" placeholder="如 20"></div></div>' +
    '<p class="hint" data-f="datehint" style="margin-top:6px"></p>' +
    '<div class="field" style="margin-top:10px"><label>違約金（選填，%）· 綁約期內提前清償收取</label><input type="number" step="0.1" data-f="penaltyPct" value="' + (loan.penaltyPct || '') + '" placeholder="如 12（× 原始借款金額）"><p class="hint" data-f="penaltyHint"></p></div>' +
    removeBtn;

  const q = (s) => card.querySelector(s);
  const updateYHint = () => { const h = q('[data-f="yhint"]'); if (h) h.textContent = loan.periods ? '= ' + (loan.periods / 12).toFixed(1) + ' 年' : ''; };
  const updateDateHint = () => {
    const h = q('[data-f="datehint"]'); if (!h) return;
    if (loan.startDate) {
      const e = Math.max(0, Math.min(monthsBetween(loan.startDate, new Date()), loan.periods || 0));
      h.textContent = '已繳約 ' + e + ' 期，剩餘 ' + ((loan.periods || 0) - e) + ' 期（現況將以「剩餘」計算）';
    } else h.textContent = '';
  };
  const updatePenaltyHint = () => {
    const h = q('[data-f="penaltyHint"]'); if (!h) return;
    const pct = parseFloat(loan.penaltyPct) || 0, lock = parseInt(loan.lockPeriods) || 0;
    if (pct > 0 && lock > 0) {
      const e = loan.startDate ? Math.max(0, Math.min(monthsBetween(loan.startDate, new Date()), loan.periods || 0)) : 0;
      const pen = Math.round((loan.principal || 0) * pct / 100);
      h.textContent = e < lock ? ('綁約 ' + lock + ' 期內（已繳 ' + e + ' 期），違約金 ≈ $' + nf(pen)) : ('已過綁約期（已繳 ' + e + ' 期 ≥ ' + lock + '），不收違約金');
    } else h.textContent = '';
  };

  q('[data-f="name"]').oninput = (e) => { loan.name = e.target.value || ('原貸款' + (idx + 1)); render(); };
  q('[data-f="isBank"]').onchange = (e) => { loan.isBank = e.target.checked; render(); };
  card.querySelectorAll('[data-f="repay"] button').forEach(b => {
    b.onclick = () => {
      card.querySelectorAll('[data-f="repay"] button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      loan.interestOnly = b.dataset.mode === 'io';
      q('[data-f="gracewrap"]').style.display = loan.interestOnly ? 'none' : '';
      render();
    };
  });
  q('[data-f="principal"]').oninput = (e) => { loan.principal = Number(e.target.value) || 0; updatePenaltyHint(); render(); };
  q('[data-f="periods"]').oninput = (e) => { loan.periods = parseInt(e.target.value) || 0; updateYHint(); updateDateHint(); render(); };
  q('[data-f="grace"]').oninput = (e) => { loan.grace = parseInt(e.target.value) || 0; render(); };
  q('[data-f="rate0"]').oninput = (e) => { loan.stages[0].rate = parseFloat(e.target.value) || 0; render(); };
  q('[data-f="startDate"]').oninput = (e) => { loan.startDate = e.target.value; updateDateHint(); updatePenaltyHint(); render(); };
  q('[data-f="lockPeriods"]').oninput = (e) => { loan.lockPeriods = parseInt(e.target.value) || 0; updatePenaltyHint(); render(); };
  q('[data-f="penaltyPct"]').oninput = (e) => { loan.penaltyPct = parseFloat(e.target.value) || 0; updatePenaltyHint(); render(); };
  card.querySelector('[data-act="addStage"]').onclick = () => {
    if (loan.stages.length >= 4) return;
    const last = loan.stages[loan.stages.length - 1];
    loan.stages.push({ fromMonth: Math.min(last.fromMonth + 24, loan.periods || 999), rate: last.rate });
    renderLoanStages(loan, q('[data-f="stages"]')); render();
  };
  const rm = card.querySelector('[data-act="remove"]');
  if (rm) rm.onclick = () => { const i = state.origLoans.indexOf(loan); if (i >= 0 && state.origLoans.length > 1) { state.origLoans.splice(i, 1); renderOrigLoans(); render(); } };

  renderLoanStages(loan, q('[data-f="stages"]'));
  updateYHint(); updateDateHint(); updatePenaltyHint();
  return card;
}

function renderOrigLoans() {
  const cont = document.getElementById('origLoans');
  cont.innerHTML = '';
  state.origLoans.forEach((loan, idx) => cont.appendChild(loanCardEl(loan, idx)));
  document.getElementById('addOrigLoan').style.display = state.origLoans.length >= 5 ? 'none' : 'block';
}

// ====== 方案2 分段利率 ======
function renderStages2() {
  const loan = state.loan2;
  const c = document.getElementById('stages2');
  c.innerHTML = '';
  loan.stages.slice(1).forEach((stage, i) => {
    const idx = i + 1;
    const div = document.createElement('div');
    div.className = 'stage';
    div.innerHTML =
      '<div class="stage-head"><span>第 ' + (idx + 1) + ' 段（選填）</span><button class="rm">移除</button></div>' +
      '<div class="grid2"><div><label>第幾期起</label><input type="number" class="sf" value="' + stage.fromMonth + '"></div>' +
      '<div><label>利率（%）</label><input type="number" step="0.01" class="sr" value="' + stage.rate + '"></div></div>';
    div.querySelector('.rm').onclick = () => { loan.stages.splice(idx, 1); renderStages2(); render(); };
    div.querySelector('.sf').oninput = (e) => { loan.stages[idx].fromMonth = parseInt(e.target.value) || 1; render(); };
    div.querySelector('.sr').oninput = (e) => { loan.stages[idx].rate = parseFloat(e.target.value) || 0; render(); };
    c.appendChild(div);
  });
}

// ====== 主渲染 ======
function render() {
  const today = new Date();
  const L2 = state.loan2;
  const origA = state.origLoans.map(l => analyze(l, today));
  const d2 = analyze(L2, today);

  const sumPrincipal = origA.reduce((a, x) => a + x.principal, 0);
  const sumFirst = origA.reduce((a, x) => a + x.firstPayment, 0);
  const sumInterest = origA.reduce((a, x) => a + x.totalInterest, 0);
  const penaltyTotal = origA.reduce((a, x) => a + x.penalty, 0);
  const bankPrincipal = origA.filter(x => x.isBank).reduce((a, x) => a + x.principal, 0);
  const nonBankPrincipal = origA.filter(x => !x.isBank).reduce((a, x) => a + x.principal, 0);
  const wAvgRate = sumPrincipal > 0 ? origA.reduce((a, x) => a + x.curRate * x.principal, 0) / sumPrincipal : 0;
  const remP = origA.map(x => x.hasDate ? x.remainingPeriods : x.periodsTotal);
  const minP = Math.min(...remP), maxP = Math.max(...remP);
  const anyDate = origA.some(x => x.hasDate);
  const anyGrace = origA.some(x => x.hasGrace);
  const anyIO = origA.some(x => x.interestOnly);
  const multi = origA.length > 1;

  // 方案2 介面提示
  document.getElementById('y2').textContent = '= ' + (L2.periods / 12).toFixed(1) + ' 年';
  document.getElementById('g2wrap').style.display = L2.interestOnly ? 'none' : '';

  // 費用
  let svcFee = 0;
  if (state.svc.mode === 'amount') { const a = parseFloat(state.svc.amount); svcFee = a > 0 ? Math.round(a) : 0; }
  else { const p = parseFloat(state.svc.percent); if (p > 0) { const base = state.svc.mode === 'diff' ? Math.max(0, (L2.principal || 0) - bankPrincipal) : (L2.principal || 0); svcFee = Math.round(base * p / 100); } }
  let advFee = 0;
  if (state.adv.mode === 'amount') { const a = parseFloat(state.adv.amount); advFee = a > 0 ? Math.round(a) : 0; }
  else { const p = parseFloat(state.adv.percent); if (p > 0) advFee = Math.round(nonBankPrincipal * p / 100); }
  let deedFee = 0; { const a = parseFloat(state.deed.amount); deedFee = a > 0 ? Math.round(a) : 0; }
  const baseFee = svcFee + advFee + deedFee;
  const totalFee = baseFee + penaltyTotal;
  const hasFees = totalFee > 0;

  // 費用輸入區提示
  const svcFormulaEl = document.getElementById('svcFormula');
  if (svcFormulaEl) svcFormulaEl.textContent = state.svc.mode === 'diff'
    ? '差額 = 新貸款 $' + nf(L2.principal) + ' − 銀行原貸 $' + nf(bankPrincipal)
    : (state.svc.mode === 'percent' ? '基數 = 新貸款額 $' + nf(L2.principal) : '');
  const svcCalcEl = document.getElementById('svcCalc');
  if (svcCalcEl) svcCalcEl.textContent = ((state.svc.mode === 'percent' || state.svc.mode === 'diff') && svcFee > 0) ? '= $' + nf(svcFee) : '';
  const advCalcEl = document.getElementById('advCalc');
  if (advCalcEl) advCalcEl.textContent = (state.adv.mode === 'percent' && advFee > 0) ? '= $' + nf(advFee) : '';

  const monthlySavings = sumFirst - d2.firstPayment;
  const pct = sumFirst > 0 ? (monthlySavings / sumFirst * 100) : 0;
  const paybackMonths = (totalFee > 0 && monthlySavings > 0) ? totalFee / monthlySavings : null;
  const interestSaved = sumInterest - d2.totalInterest;
  const netSavings = interestSaved - totalFee;
  const maxPay = Math.max(sumFirst, d2.firstPayment) || 1;

  const bar = (label, val, color) =>
    '<div class="bar-row"><span class="bl">' + label + '</span><div class="bar-track"><div class="bar-fill" style="width:' + (val / maxPay * 100) + '%;background:' + color + '">$' + nf(val) + '</div></div></div>';
  const benefit = (n, t, d) => '<div class="benefit"><span class="n">' + n + ' ' + t + '</span><span>' + d + '</span></div>';
  const payCellD2 = (d) => {
    let s = '<span class="pill g">$' + nf(d.firstPayment) + '</span>';
    if (d.hasGrace) s += '<br><span class="small">寬限期內，期滿後 $' + nf(d.afterGracePayment) + '</span>';
    if (d.interestOnly) s += '<br><span class="small" style="color:#e8505b">純繳息，期滿須還本金 $' + nf(d.balloon) + '</span>';
    return s;
  };

  let html = '';
  html += '<h2 class="ptitle">貸款轉貸提案</h2>';

  // 抬頭
  const h = state.header;
  const hasHeader = h.clientName || h.agentName || h.date;
  if (hasHeader) {
    const dateStr = h.date ? new Date(h.date + 'T00:00:00').toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
    html += '<div class="pheader"><div class="pheader-left">';
    if (h.clientName) html += '<div class="client-label">敬呈</div><div class="client">' + escapeHtml(h.clientName) + ' 您好</div>';
    html += '</div><div class="pheader-right">';
    if (h.agentName) html += '業務：' + escapeHtml(h.agentName) + '<br>';
    if (dateStr) html += '日期：' + dateStr;
    html += '</div></div>';
  } else {
    html += '<p class="pdate">試算日期：' + new Date().toLocaleDateString('zh-TW') + '</p>';
  }

  // 結論卡
  if (monthlySavings > 0 || interestSaved > 0) {
    const parts = [];
    if (monthlySavings > 0) parts.push('每月省下 <b>$' + nf(monthlySavings) + '</b>');
    if (interestSaved > 0) parts.push('總利息估省 <b>$' + nf(interestSaved) + '</b>');
    html += '<div class="keypoint">轉貸後，' + parts.join('，') + '。</div>';
  }

  // 原貸款明細子表（≥2 筆）
  if (multi && state.ui.showDetail) {
    const showPenCol = penaltyTotal > 0;
    html += '<div class="sect">原貸款明細</div>';
    html += '<table class="detail" style="font-size:11px"><thead><tr><th>名稱</th><th>金額</th>' + (anyDate ? '<th>目前餘額</th>' : '') + '<th>利率</th><th>期數</th><th>月付</th>' + (showPenCol ? '<th>違約金</th><th>清償金額</th>' : '') + '</tr></thead><tbody>';
    origA.forEach(x => {
      const nm = escapeHtml(x.name) + (x.isBank ? ' <span class="small">🏦銀行</span>' : '');
      const per = x.hasDate ? ('剩' + x.remainingPeriods + '/共' + x.periodsTotal) : (x.periodsTotal + ' 期');
      const balCell = anyDate ? ('<td>' + (x.hasDate ? '$' + nf(x.balanceNow) : '—') + '</td>') : '';
      html += '<tr><td>' + nm + '</td><td>$' + nf(x.principal) + '</td>' + balCell + '<td>' + x.curRate + '%</td><td>' + per + '</td><td>$' + nf(x.firstPayment) + '</td>'
        + (showPenCol ? ('<td>' + (x.penalty ? '$' + nf(x.penalty) : '—') + '</td><td>$' + nf(x.payoff) + '</td>') : '') + '</tr>';
    });
    html += '</tbody></table>';
  }

  // 核心數據對比
  const origName = multi ? '原貸款合計' : escapeHtml(origA[0].name);
  html += '<div class="sect">核心數據對比</div>';
  html += '<table><thead><tr><th>項目</th><th class="c1">' + origName + '</th><th class="c2">' + escapeHtml(L2.name) + '</th></tr></thead><tbody>';
  html += '<tr><td>貸款金額</td><td>$' + nf(sumPrincipal) + (multi ? '<br><span class="small">' + origA.length + ' 筆合計</span>' : '') + '</td><td>$' + nf(L2.principal) + '</td></tr>';
  const rateCell = multi ? (wAvgRate.toFixed(2) + '%<br><span class="small">加權平均</span>') : ratesLabelStages(state.origLoans[0]);
  html += '<tr><td>年利率</td><td><span class="pill r">' + rateCell + '</span></td><td><span class="pill g">' + ratesLabelStages(L2) + '</span></td></tr>';
  let periodCell;
  if (multi) { periodCell = (minP === maxP ? minP + ' 期' : minP + '～' + maxP + ' 期') + (anyDate ? '<br><span class="small">剩餘期數</span>' : ''); }
  else { const x = origA[0]; periodCell = x.hasDate ? ('剩 ' + x.remainingPeriods + ' / 共 ' + x.periodsTotal + ' 期') : (x.periodsTotal + ' 期 (' + (x.periodsTotal / 12).toFixed(1) + '年)'); }
  html += '<tr><td>還款期</td><td>' + periodCell + '</td><td>' + L2.periods + ' 期 (' + (L2.periods / 12).toFixed(1) + '年)</td></tr>';
  if (!multi && origA[0].hasDate) html += '<tr><td>目前本金餘額<br><span class="small">（依起始日試算至今）</span></td><td>$' + nf(origA[0].balanceNow) + '</td><td>—</td></tr>';
  if (anyGrace || d2.hasGrace) html += '<tr><td>寬限期</td><td>' + (anyGrace ? '有' : '無') + '</td><td>' + (d2.hasGrace ? d2.graceMonths + ' 期' : '無') + '</td></tr>';
  html += '<tr><td>每月應繳' + (anyGrace || d2.hasGrace ? '（初期）' : '') + (anyDate ? '（目前）' : '') + '</td><td><span class="pill r">$' + nf(sumFirst) + '</span></td><td>' + payCellD2(d2) + '</td></tr>';
  if (monthlySavings > 0) html += '<tr class="hl"><td>每月現金流改善</td><td></td><td>節省 $' + nf(monthlySavings) + ' ↓' + pct.toFixed(1) + '%</td></tr>';
  html += '<tr><td>總利息支出' + (anyDate ? '<br><span class="small">（剩餘）</span>' : '') + '</td><td>$' + nf(sumInterest) + '</td><td>$' + nf(d2.totalInterest) + '</td></tr>';
  html += '</tbody></table>';

  // 月付金階段明細
  const segGroups = [];
  origA.forEach((x, i) => { if (x.multiSegment) segGroups.push({ segs: x.segments, t: x.name, c: palette[i % palette.length] }); });
  if (d2.multiSegment) segGroups.push({ segs: d2.segments, t: L2.name, c: '#14a098' });
  if (segGroups.length) {
    html += '<div class="sect">月付金階段明細</div>';
    segGroups.forEach(g => {
      html += '<p style="margin:8px 0 2px;font-size:12px;color:#888">' + escapeHtml(g.t) + '</p>';
      g.segs.forEach(s => {
        const kind = s.type === 'grace' ? '寬限期（只繳息）' : s.type === 'io' ? '純繳息' : '一般攤還';
        html += '<div class="segrow"><span style="color:#555">第 ' + s.fromMonth + ' 期起 · ' + s.rate + '% · ' + kind + '</span><span style="color:' + g.c + ';font-weight:bold">$' + nf(s.pay) + '</span></div>';
      });
    });
    if (anyGrace || d2.hasGrace) html += '<div class="gracebox">⚠ 寬限期內只繳利息、本金不減少，期滿後月付金會提高，且總利息會比無寬限期時增加。</div>';
  }

  // 月付金比較
  html += '<div class="sect">月付金比較' + (anyGrace || d2.hasGrace ? '（初期）' : '') + '</div>';
  if (multi) {
    let inner = '';
    origA.forEach((x, i) => { inner += '<div class="bar-fill" style="width:' + (x.firstPayment / maxPay * 100) + '%;background:' + palette[i % palette.length] + '">$' + nf(x.firstPayment) + '</div>'; });
    html += '<div class="bar-row"><span class="bl">原貸款</span><div class="bar-track" style="display:flex">' + inner + '</div></div>';
    const legend = origA.map((x, i) => '<span style="color:' + palette[i % palette.length] + '">■</span> ' + escapeHtml(x.name)).join('　');
    html += '<div style="font-size:11px;color:#888;margin:2px 0 8px;padding-left:64px">' + legend + '　＝ 合計 $' + nf(sumFirst) + '</div>';
  } else {
    html += bar(escapeHtml(origA[0].name), sumFirst, palette[0]);
  }
  html += bar(escapeHtml(L2.name), d2.firstPayment, '#14a098');

  // 違約金 / 清償提醒
  if (penaltyTotal > 0) {
    html += '<div class="io-warn">⚠ <b>提前解約違約金</b>（綁約期內清償才收）：';
    origA.forEach(x => { if (x.penalty > 0) html += '<br>· ' + escapeHtml(x.name) + '：綁約 ' + x.lock + ' 期內（已繳 ' + x.elapsed + ' 期），違約金 $' + nf(x.penalty) + '；清償金額（剩餘本金 + 違約金）$' + nf(x.payoff) + '。'; });
    html += '</div>';
  }

  // 純繳息提醒
  if (anyIO || d2.interestOnly) {
    html += '<div class="io-warn">⚠ 純繳息方案：每月只繳利息、本金完全未償還，到期需一次清償本金。';
    origA.forEach(x => { if (x.interestOnly && x.balloon) html += escapeHtml(x.name) + '期滿需清償 $' + nf(x.balloon) + '。'; });
    if (d2.interestOnly && d2.balloon) html += escapeHtml(L2.name) + '期滿需清償 $' + nf(d2.balloon) + '。';
    html += '</div>';
  }

  // 費用明細 + 回本
  if (hasFees) {
    html += '<div class="sect">費用明細（收費）</div><div class="feebox">';
    if (svcFee > 0) {
      let f = '';
      if (state.svc.mode === 'percent') f = '新貸款額 $' + nf(L2.principal) + ' × ' + state.svc.percent + '% ＝ ';
      else if (state.svc.mode === 'diff') f = '（新貸款 $' + nf(L2.principal) + ' − 銀行原貸 $' + nf(bankPrincipal) + '）× ' + state.svc.percent + '% ＝ ';
      html += '轉貸服務費：' + f + '<b>$' + nf(svcFee) + '</b><br>';
    }
    if (advFee > 0) html += '代墊費用：' + (state.adv.mode === 'percent' ? '非銀行原貸 $' + nf(nonBankPrincipal) + ' × ' + state.adv.percent + '% ＝ ' : '') + '<b>$' + nf(advFee) + '</b><br>';
    if (deedFee > 0) html += '代書費：<b>$' + nf(deedFee) + '</b><br>';
    if (penaltyTotal > 0) html += '違約金合計：<b>$' + nf(penaltyTotal) + '</b><br>';
    html += '合計一次性費用：<b>$' + nf(totalFee) + '</b></div>';

    if (state.ui.showPayback) {
      html += '<div class="sect">回本速度試算</div><table><tbody>';
      html += '<tr><td>一次性費用</td><td>$' + nf(totalFee) + '</td></tr>';
      html += '<tr><td>每月節省金額</td><td>$' + nf(Math.abs(monthlySavings)) + '</td></tr>';
      html += paybackMonths !== null
        ? '<tr class="hl"><td>費用回本時間</td><td>約 ' + paybackMonths.toFixed(1) + ' 個月</td></tr>'
        : '<tr><td>費用回本時間</td><td>無月省，不適用</td></tr>';
      if (netSavings > 0) html += '<tr class="hl"><td>回本後總節省<br><span class="small">(總利息差 − 費用)</span></td><td>$' + nf(netSavings) + '</td></tr>';
      html += '</tbody></table>';
    }
  }

  // 撥款試算（客戶實拿）— 僅當「有填日期」且「有服務費或代墊費」時顯示
  if (anyDate && (svcFee > 0 || advFee > 0 || deedFee > 0)) {
    const sumPayoff = origA.reduce((a, x) => a + x.payoff, 0);
    const netToCustomer = (L2.principal || 0) - sumPayoff - svcFee - advFee - deedFee;
    html += '<div class="sect">撥款試算（客戶實拿）</div><table><tbody>';
    html += '<tr><td>新貸款撥款額</td><td>$' + nf(L2.principal) + '</td></tr>';
    html += '<tr><td>− 清償原貸款合計' + (penaltyTotal > 0 ? '<br><span class="small">（含違約金 $' + nf(penaltyTotal) + '）</span>' : '') + '</td><td>− $' + nf(sumPayoff) + '</td></tr>';
    if (svcFee > 0) html += '<tr><td>− 轉貸服務費</td><td>− $' + nf(svcFee) + '</td></tr>';
    if (advFee > 0) html += '<tr><td>− 代墊費用</td><td>− $' + nf(advFee) + '</td></tr>';
    if (deedFee > 0) html += '<tr><td>− 代書費</td><td>− $' + nf(deedFee) + '</td></tr>';
    html += '<tr class="hl"><td>客戶實際可動用</td><td>$' + nf(netToCustomer) + '</td></tr>';
    html += '</tbody></table>';
    if (netToCustomer < 0) html += '<div class="io-warn">⚠ 試算為負，表示新貸款額不足以清償原貸款與費用，客戶需另補差額 $' + nf(Math.abs(netToCustomer)) + '。</div>';
  }

  // 對客戶的好處
  const r1 = wAvgRate, r2 = L2.stages[0].rate;
  const rateDrop = r1 - r2;
  const rateDropPct = r1 > 0 ? (rateDrop / r1 * 100) : 0;
  if (monthlySavings > 0 || hasFees || rateDrop > 0) {
    html += '<div class="sect">對客戶的好處</div>';
    const circ = ['①', '②', '③', '④', '⑤'];
    let bi = 0;
    if (rateDrop > 0) html += benefit(circ[bi++], '利率大幅下降', '年利率由 ' + r1.toFixed(2) + '% 降至 ' + r2 + '%，調降 ' + rateDrop.toFixed(2) + ' 個百分點（約 ' + rateDropPct.toFixed(0) + '%）');
    if (monthlySavings > 0) html += benefit(circ[bi++], '月繳下降', '每月減少 $' + nf(monthlySavings) + '，現金流壓力立即舒緩');
    if (!multi) {
      const x = origA[0];
      const oy = (x.hasDate ? x.remainingPeriods : x.periodsTotal) / 12, ny = L2.periods / 12, yd = ny - oy;
      if (Math.abs(yd) > 0.05) html += benefit(circ[bi++], '還款期' + (yd > 0 ? '延長' : '縮短'), '從 ' + oy.toFixed(1) + ' 年' + (yd > 0 ? '拉長' : '縮短') + '至 ' + ny.toFixed(1) + ' 年');
    }
    if (paybackMonths !== null) html += benefit(circ[bi++], '費用回本', '支付 $' + nf(totalFee) + '，約 ' + paybackMonths.toFixed(1) + ' 個月回本，長期划算');
  }

  html += '<p class="disclaimer">本試算僅供參考，實際數字以銀行核貸與帳單為準。</p>';

  // 還原碼 QR（匯入用）
  if (state.ui.showQR) {
    const qrTag = makeQRTag();
    if (qrTag) html += '<div style="text-align:center;margin-top:14px">' + qrTag + '<p style="font-size:10px;color:#bbb;margin:4px 0 0">設定還原碼（匯入提案用）</p></div>';
  }

  document.getElementById('proposal').innerHTML = html;
}

// 將目前所有設定編碼成字串（給 QR）
function encodeState() {
  const data = { v: 1, header: state.header, origLoans: state.origLoans, loan2: state.loan2, svc: state.svc, adv: state.adv, deed: state.deed, ui: state.ui };
  return LZString.compressToEncodedURIComponent(JSON.stringify(data));
}

// 產生 QR 的 <img> 標籤；資料過大或函式庫未載入時回傳空字串
function makeQRTag() {
  try {
    if (typeof qrcode === 'undefined' || typeof LZString === 'undefined') return '';
    const text = encodeState();
    const qr = qrcode(0, 'M');
    qr.addData(text);
    qr.make();
    return qr.createImgTag(2, 4);
  } catch (e) {
    return '';
  }
}

// ====== 匯入（從匯出的圖片掃 QR 還原） ======
function applyStateToUI(s) {
  if (!s || !s.origLoans) throw new Error('資料格式不符');
  state.header = Object.assign({ clientName: '', agentName: '', date: '' }, s.header || {});
  state.origLoans = s.origLoans.map(l => Object.assign({ name: '原貸款', isBank: false, interestOnly: false, principal: 0, periods: 0, grace: 0, stages: [{ fromMonth: 1, rate: 0 }], startDate: '', lockPeriods: 0, penaltyPct: 0 }, l));
  state.loan2 = Object.assign({ name: '方案 2（轉貸後）', principal: 0, periods: 0, grace: 0, stages: [{ fromMonth: 1, rate: 0 }], interestOnly: false }, s.loan2 || {});
  state.svc = Object.assign({ mode: 'percent', percent: '', amount: '' }, s.svc || {});
  state.adv = Object.assign({ mode: 'percent', percent: '', amount: '' }, s.adv || {});
  state.deed = Object.assign({ amount: '' }, s.deed || {});
  state.ui = Object.assign({ showPayback: true, showDetail: true, showQR: true }, s.ui || {});

  // 回填靜態輸入欄
  document.getElementById('clientName').value = state.header.clientName || '';
  document.getElementById('agentName').value = state.header.agentName || '';
  document.getElementById('proposalDate').value = state.header.date || '';
  document.getElementById('name2').value = state.loan2.name || '';
  document.getElementById('p2').value = state.loan2.principal || '';
  document.getElementById('n2').value = state.loan2.periods || '';
  document.getElementById('g2').value = state.loan2.grace || '';
  document.getElementById('r2').value = state.loan2.stages[0].rate || '';
  // 方案2 還款方式
  document.getElementById('toggleRepay2').querySelectorAll('button').forEach(b => {
    b.classList.toggle('on', (b.dataset.mode === 'io') === !!state.loan2.interestOnly);
  });
  // 費用：服務費
  document.getElementById('segSvc').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.mode === state.svc.mode));
  document.getElementById('svcPct').style.display = state.svc.mode === 'amount' ? 'none' : 'block';
  document.getElementById('svcAmt').style.display = state.svc.mode === 'amount' ? 'block' : 'none';
  document.getElementById('svcPercent').value = state.svc.percent || '';
  document.getElementById('svcAmount').value = state.svc.amount || '';
  // 費用：代墊
  document.getElementById('segAdv').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.mode === state.adv.mode));
  document.getElementById('advPct').style.display = state.adv.mode === 'percent' ? 'block' : 'none';
  document.getElementById('advAmt').style.display = state.adv.mode === 'amount' ? 'block' : 'none';
  document.getElementById('advPercent').value = state.adv.percent || '';
  document.getElementById('advAmount').value = state.adv.amount || '';
  document.getElementById('deedAmount').value = state.deed.amount || '';
  // 顯示選項
  document.getElementById('showPayback').checked = !!state.ui.showPayback;
  document.getElementById('showDetail').checked = !!state.ui.showDetail;
  document.getElementById('showQR').checked = !!state.ui.showQR;

  renderOrigLoans();
  renderStages2();
  render();
}

document.getElementById('btnImport').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = function (ev) {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    try {
      const cv = document.createElement('canvas');
      const maxW = 1600;
      const scale = img.width > maxW ? maxW / img.width : 1;
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, 0, 0, cv.width, cv.height);
      const imgData = ctx.getImageData(0, 0, cv.width, cv.height);
      const code = (typeof jsQR !== 'undefined') ? jsQR(imgData.data, cv.width, cv.height) : null;
      if (!code) { alert('找不到還原碼 QR。請確認這是「含還原碼」匯出的提案圖片，且 QR 清晰未被裁切。'); return; }
      const json = LZString.decompressFromEncodedURIComponent(code.data);
      const parsed = JSON.parse(json);
      applyStateToUI(parsed);
      alert('匯入成功，已還原提案內容。');
    } catch (e) {
      alert('匯入失敗：無法解析還原碼。' + (e && e.message ? '（' + e.message + '）' : ''));
    } finally {
      URL.revokeObjectURL(img.src);
      ev.target.value = '';
    }
  };
  img.onerror = () => { alert('圖片讀取失敗。'); ev.target.value = ''; };
  img.src = URL.createObjectURL(file);
};

// 匯出
async function capture() { return await html2canvas(document.getElementById('proposal'), { scale: 2, backgroundColor: '#ffffff', useCORS: true }); }
document.getElementById('btnImg').onclick = async function () {
  this.disabled = true; this.textContent = '產生中…';
  try { const c = await capture(); const a = document.createElement('a'); a.download = '轉貸提案.png'; a.href = c.toDataURL('image/png'); a.click(); }
  finally { this.disabled = false; this.textContent = '匯出圖片'; }
};
document.getElementById('btnPdf').onclick = async function () {
  this.disabled = true; this.textContent = '產生中…';
  try {
    const canvas = await capture();
    const img = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageW = pdf.internal.pageSize.getWidth(), pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW, imgH = canvas.height * imgW / canvas.width;
    let heightLeft = imgH, position = 0;
    pdf.addImage(img, 'PNG', 0, position, imgW, imgH); heightLeft -= pageH;
    while (heightLeft > 0) { position -= pageH; pdf.addPage(); pdf.addImage(img, 'PNG', 0, position, imgW, imgH); heightLeft -= pageH; }
    pdf.save('轉貸提案.pdf');
  } finally { this.disabled = false; this.textContent = '匯出 PDF'; }
};

// ===== 嵌入 CRM 時的雙向溝通（postMessage）=====
(function(){
  // 嵌入(iframe)用 window.parent；新視窗(window.open)用 window.opener
  var host = window.opener || (window.parent !== window ? window.parent : null);
  if (!host) return; // 獨立開啟，不啟用溝通
  window.addEventListener('message', function(ev){
    const d = ev.data;
    if (!d || d.type !== 'crm-init') return;
    try { if (d.state) applyStateToUI(d.state); }
    catch(e){ console.error('crm-init 套用失敗', e); }
  });
  try { host.postMessage({ type: 'calc-ready' }, '*'); } catch(e){}
  let _lastJSON = '';
  setInterval(function(){
    try {
      const j = JSON.stringify(state);
      if (j !== _lastJSON) {
        _lastJSON = j;
        host.postMessage({ type: 'calc-state', state: JSON.parse(j) }, '*');
      }
    } catch(e){}
  }, 1000);
})();
