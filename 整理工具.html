<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>總檔整理工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei',sans-serif;background:#F5F4F0;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:24px 16px}
.card{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:600px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
h2{font-size:20px;font-weight:700;margin-bottom:6px}
p.sub{font-size:13px;color:#888;margin-bottom:20px}
label.file-label{display:block;background:#EFEDE8;border:2px dashed #DDD9D0;border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:.2s}
label.file-label:hover{border-color:#2B5BE2;background:#EDF1FC}
label.file-label.has-file{border-color:#1D8C5E;background:#E8F7F1}
#fileInput{display:none}
#fileName{font-size:12px;color:#888;margin-top:4px}

/* 分頁對應表 */
#sheetMapWrap{display:none;margin-bottom:16px}
#sheetMapWrap h3{font-size:13px;font-weight:700;margin-bottom:8px;color:#333}
.sheet-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.sheet-name{background:#F5F4F0;border-radius:6px;padding:6px 10px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sheet-arrow{color:#999;font-size:12px;text-align:center}
.sheet-select{background:#F5F4F0;border:1.5px solid #DDD9D0;border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;cursor:pointer;outline:none;width:100%}
.sheet-select.unmatched{border-color:#FFD54F;background:#FFF8E1}
.warn-note{font-size:11px;color:#B45309;margin-top:4px;display:none}

button.run{width:100%;background:#2B5BE2;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
button.run:disabled{opacity:.5;cursor:default}
button.run:not(:disabled):hover{background:#2451C7}
#log{margin-top:20px;background:#F5F4F0;border-radius:10px;padding:16px;font-size:12px;line-height:1.9;white-space:pre-wrap;max-height:320px;overflow-y:auto;display:none}
</style>
</head>
<body>
<div class="card">
  <h2>📋 總檔整理工具</h2>
  <p class="sub">自動偵測分頁、去除重複、合併拜訪記錄，輸出乾淨的 Excel</p>

  <label class="file-label" id="fileLabel" onclick="document.getElementById('fileInput').click()">
    <div style="font-size:28px">📂</div>
    <div style="font-weight:600;margin-top:6px">點此選擇 .xlsx 檔案</div>
    <div id="fileName">尚未選擇檔案</div>
  </label>
  <input type="file" id="fileInput" accept=".xlsx">

  <!-- 分頁對應設定（選完檔案後出現） -->
  <div id="sheetMapWrap">
    <h3>📑 偵測到的分頁 — 請確認分類對應</h3>
    <div id="sheetMapRows"></div>
    <div class="warn-note" id="warnNote">⚠️ 有分頁未對應，這些分頁將被略過</div>
  </div>

  <button class="run" id="runBtn" onclick="process()" disabled>開始整理</button>
  <div id="log"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── 優先順序定義（數字越大越優先保留）────────────────────────
const CATEGORY_PRIORITY = {
  '無效案件': 6,
  '已塗銷':   5,
  '已簽約':   4,
  '追很緊':   3,  // 追蹤ing 分頁對應此分類
  '覆訪':     2,
  '新鑫':     1,
  '找':       1,
  '待分類':   1,
  '略過':     0
};
const CATEGORY_OPTIONS = ['無效案件','已塗銷','已簽約','追很緊','覆訪','找','新鑫','待分類','略過'];
const HEADER_ROWS = 2;

// 關鍵字猜測分類（對應 app 現有分類）
function guessCat(name) {
  const s = name.trim();
  if (/無效|失效|斷聯/.test(s))        return '無效案件';
  if (/塗銷/.test(s))                  return '已塗銷';
  if (/簽約/.test(s))                  return '已簽約';
  if (/追蹤|ing/i.test(s))             return '追很緊';   // 追蹤ing → 追很緊
  if (/覆訪|回訪/.test(s))             return '覆訪';
  if (s === '找' || /^找/.test(s))     return '覆訪';     // 找 → 覆訪
  if (/新鑫/.test(s))                  return '新鑫';
  return '待分類';                                         // 未知分頁 → 待分類
}

let loadedWb = null;
let detectedSheets = []; // [{name, guess}]

// 選檔後立刻偵測分頁
document.getElementById('fileInput').addEventListener('change', async function(){
  if (!this.files.length) return;
  const file = this.files[0];
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileLabel').classList.add('has-file');
  document.getElementById('runBtn').disabled = true;

  const ab = await file.arrayBuffer();
  loadedWb = XLSX.read(ab, {type:'array', cellStyles:true, cellNF:true, sheetStubs:true});

  // 取所有分頁名稱
  detectedSheets = loadedWb.SheetNames.map(n => ({ name: n, cat: guessCat(n) }));

  renderSheetMap();
  document.getElementById('sheetMapWrap').style.display = 'block';
  document.getElementById('runBtn').disabled = false;
});

function renderSheetMap() {
  const wrap = document.getElementById('sheetMapRows');
  wrap.innerHTML = detectedSheets.map((s, i) => {
    const isUnmatched = s.cat === '略過';
    const opts = CATEGORY_OPTIONS.map(c =>
      `<option value="${c}" ${c === s.cat ? 'selected' : ''}>${c === '略過' ? '— 略過此分頁 —' : c}</option>`
    ).join('');
    return `<div class="sheet-row">
      <div class="sheet-name" title="${s.name}">${s.name}</div>
      <div class="sheet-arrow">→</div>
      <select class="sheet-select ${isUnmatched?'unmatched':''}" data-idx="${i}" onchange="onCatChange(this)">
        ${opts}
      </select>
    </div>`;
  }).join('');
  checkWarn();
}

function onCatChange(sel) {
  const idx = parseInt(sel.getAttribute('data-idx'));
  detectedSheets[idx].cat = sel.value;
  sel.classList.toggle('unmatched', sel.value === '略過');
  checkWarn();
}

function checkWarn() {
  const hasSkip = detectedSheets.some(s => s.cat === '略過');
  const allSkip = detectedSheets.every(s => s.cat === '略過');
  document.getElementById('warnNote').style.display = hasSkip ? 'block' : 'none';
  document.getElementById('runBtn').disabled = allSkip;
}

function addLog(msg){
  const el=document.getElementById('log');
  el.style.display='block';
  el.textContent+=msg+'\n';
  el.scrollTop=el.scrollHeight;
}

function extractPhones(text){
  if(!text) return [];
  return (String(text).match(/09\d{8}|0[2-9]\d{7,8}/g)||[]).map(p=>p.replace(/[-\s]/g,''));
}
function extractIDs(text){
  if(!text) return [];
  return (String(text).match(/[A-Z]\d{9}/g)||[]);
}

async function process(){
  if (!loadedWb) { alert('請先選擇檔案'); return; }
  document.getElementById('runBtn').disabled = true;
  document.getElementById('log').textContent = '';

  // 只處理非略過的分頁
  const activeSheets = detectedSheets.filter(s => s.cat !== '略過');
  if (!activeSheets.length) { addLog('❌ 沒有任何分頁要處理'); document.getElementById('runBtn').disabled=false; return; }

  addLog('📂 開始讀取…\n');

  try {
    // ── 1. 解析所有分頁 ──
    const allRows = [];
    activeSheets.forEach(({ name, cat }) => {
      const ws = loadedWb.Sheets[name];
      if (!ws) { addLog(`⚠️  找不到分頁「${name}」，略過`); return; }
      const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const isXinXin = (cat === '新鑫');
      let count = 0;
      for (let i = HEADER_ROWS; i < data.length; i++) {
        const row = data[i];
        if (row.every(c => c===''||c===null||c===undefined)) continue;

        if (isXinXin) {
          // 新鑫欄位：A=姓名 B=身分證 C=電話 D=地址 E=備註
          // 跳過姓名欄空白的列（包含批次標頭行）
          if (!String(row[0]||'').trim()) continue;
        } else {
          // 一般欄位：A=電話 D=標示部 G=所有權人 B=拜訪記錄
          const ownerCell = String(row[6]||'');
          const buildCell = String(row[3]||'');
          const bCell     = String(row[1]||'');
          if (!ownerCell && !buildCell && !bCell) continue;
        }

        // 依格式從不同欄位抓電話和身分證
        const ids    = isXinXin
          ? extractIDs(String(row[1]||''))                         // 新鑫：B欄是身分證
          : extractIDs(String(row[6]||''));                        // 一般：G欄是所有權人

        const phones = isXinXin
          ? extractPhones(String(row[2]||'')).filter(p=>p.length>=9)  // 新鑫：C欄是電話
          : [...extractPhones(String(row[0]||'')),
             ...extractPhones(String(row[12]||''))].filter(p=>p.length>=9); // 一般：A欄+M欄

        const prio = CATEGORY_PRIORITY[cat] || 1;
        allRows.push({ sheet: name, cat, prio, row: [...row], ids, phones, isXinXin });
        count++;
      }
      addLog(`   ${name}（→ ${cat}）：${count} 筆`);
    });
    addLog(`\n✅ 合計讀入 ${allRows.length} 筆`);

    // ── 2. Union-Find 去重 ──
    const N   = allRows.length;
    const par = Array.from({length: N}, (_, i) => i);
    function find(x){ return par[x]===x ? x : (par[x]=find(par[x])); }
    function unite(x,y){ par[find(x)]=find(y); }

    // 從標示部（col 3）抓建號，格式如 A_12345_001_0001-001
    function extractBuildNo(buildInfo) {
      const m = String(buildInfo||'').match(/([A-Z]_\d+_\d+_\d+-\d+)/);
      return m ? m[1] : '';
    }

    // 判斷兩筆是否可以合併（同一人 + 同一物件才合併）
    function canMerge(a, b) {
      // 新鑫格式沒有建號概念，直接合併
      if (a.isXinXin || b.isXinXin) return true;

      const buildA = extractBuildNo(a.row[3]);
      const buildB = extractBuildNo(b.row[3]);

      // 兩筆都有建號且不同 → 同一人但不同物件，不合併
      if (buildA && buildB && buildA !== buildB) return false;

      // 建號無法判斷時，改比對門牌地址前 10 字
      const addrA = String(a.row[4]||'').replace(/\s/g,'').slice(0, 10);
      const addrB = String(b.row[4]||'').replace(/\s/g,'').slice(0, 10);
      if (addrA && addrB && addrA.length >= 6 && addrA !== addrB) return false;

      return true; // 同一人同一物件，可以合併
    }

    const phoneMap = new Map(), idMap = new Map();
    allRows.forEach((r, i) => {
      r.phones.forEach(p => {
        if (phoneMap.has(p)) {
          if (canMerge(r, allRows[phoneMap.get(p)])) unite(i, phoneMap.get(p));
        } else { phoneMap.set(p, i); }
      });
      r.ids.forEach(id => {
        if (idMap.has(id)) {
          if (canMerge(r, allRows[idMap.get(id)])) unite(i, idMap.get(id));
        } else { idMap.set(id, i); }
      });
    });

    // ── 3. 分組 ──
    const groups = new Map();
    allRows.forEach((_, i) => {
      const r = find(i);
      if (!groups.has(r)) groups.set(r, []);
      groups.get(r).push(i);
    });

    let mergedGroups = 0, mergedRows = 0;
    const outputBySheet = {};
    activeSheets.forEach(s => { outputBySheet[s.name] = []; });

    groups.forEach(members => {
      members.sort((a,b) => allRows[b].prio - allRows[a].prio || a - b);
      const best   = allRows[members[0]];
      const outRow = [...best.row];

      if (members.length > 1) {
        // 合併記錄欄：新鑫用 E 欄(index 4)備註，一般分頁用 B 欄(index 1)拜訪記錄
        const logCol = best.isXinXin ? 4 : 1;
        const logs   = [];
        members.forEach(mi => {
          const r = allRows[mi];
          // 只合併同格式的欄位（不把新鑫備註混進一般拜訪記錄）
          if (r.isXinXin !== best.isXinXin) return;
          const v = String(r.row[logCol]||'').trim();
          if (v && !logs.includes(v)) logs.push(v);
        });
        if (logs.length > 0) outRow[logCol] = logs.join('\n');
        mergedGroups++;
        mergedRows += members.length - 1;
      }

      outputBySheet[best.sheet].push(outRow);
    });

    addLog('\n🔍 去重結果：');
    addLog(`   原始 ${allRows.length} 筆 → 整理後 ${groups.size} 筆`);
    addLog(`   合併了 ${mergedGroups} 組（移除 ${mergedRows} 筆重複）`);
    activeSheets.forEach(({ name }) => {
      const orig = allRows.filter(r => r.sheet === name).length;
      const out  = outputBySheet[name].length;
      addLog(`   ${name}：${orig} → ${out} 筆`);
    });

    // ── 4. 建立輸出 workbook ──
    addLog('\n📝 建立輸出檔案…');
    const outWb = XLSX.utils.book_new();

    activeSheets.forEach(({ name }) => {
      const ws       = loadedWb.Sheets[name];
      const origData = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const headers  = origData.slice(0, HEADER_ROWS);
      const newData  = [...headers, ...outputBySheet[name]];
      const newWs    = XLSX.utils.aoa_to_sheet(newData);

      if (ws['!cols']) newWs['!cols'] = JSON.parse(JSON.stringify(ws['!cols']));
      if (ws['!rows']) newWs['!rows'] = ws['!rows'].slice(0, HEADER_ROWS);

      XLSX.utils.book_append_sheet(outWb, newWs, name);
    });

    // ── 5. 下載 ──
    const d  = new Date();
    const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const out = `整理後_總檔_${ds}.xlsx`;
    XLSX.writeFile(outWb, out, {compression: true});

    addLog(`\n✅ 完成！下載檔名：${out}`);
    addLog('注意：儲存格顏色無法保留（xlsx.js 限制），欄位資料和欄寬已保留。');

  } catch(e) {
    addLog('❌ 發生錯誤：' + e.message);
    console.error(e);
  }
  document.getElementById('runBtn').disabled = false;
}
</script>
</body>
</html>
